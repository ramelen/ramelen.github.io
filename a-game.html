<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>sandcastle builder for dummies</title>
    </head>
    <body>
        <script>
            var inv = {}
        </script>
        <p>
                <button type="button" id="button01" onclick="addItem('sand', 1)">im also a button</button>
        </p>
<script>
function addItem(name, quantity) {
    if (inv.hasOwnProperty(name)) {
        inv[name] += quantity
    } else {
        inv[name] = quantity
    }
}
</script>
    </body>
</html>
